version: "3.8"

services:
  aethertrade-swarm-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aethertrade-swarm-api
    ports:
      - "8888:8888"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - ./logs:/app/logs
    networks:
      - aethertrade-net

networks:
  aethertrade-net:
    driver: bridge
